<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hmac-secret WebAuthn Test</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; line-height: 1.5; }
        .buttons { margin: 20px 0; display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #f8f9fa; }
        button:hover:not(:disabled) { background: #e2e6ea; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; overflow-x: auto; min-height: 200px; }
    </style>
</head>
<body>
    <h2>hmac-secret Extension Test</h2>
    <p>This tests the CTAP2.0 <code>hmac-secret</code> extension (using <code>hmacCreateSecret</code> on creation, and <code>hmacGetSecret</code> on assertion). <em>Note: Your authenticator must support this extension and user verification (e.g., a PIN or biometric) is usually required.</em></p>
    
    <div class="buttons">
        <button id="btn-create">1. Create Credential (hmacCreateSecret)</button>
        <button id="btn-get" disabled>2. Get Secret (hmacGetSecret)</button>
    </div>

    <h3>Log Output</h3>
    <pre id="log"></pre>

    <script>
        const btnCreate = document.getElementById('btn-create');
        const btnGet = document.getElementById('btn-get');
        const logEl = document.getElementById('log');

        let savedCredentialId = null;

        // Simple logging utility
        function log(message) {
            console.log(message);
            if (typeof message === 'object') {
                message = JSON.stringify(message, null, 2);
            }
            logEl.textContent += message + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Utility to convert ArrayBuffer to Hex string for easy reading
        function bufferToHex(buffer) {
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        btnCreate.addEventListener('click', async () => {
            log("--- Starting Registration (hmacCreateSecret) ---");
            try {
                // 32-byte challenge & 16-byte user ID
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const userId = crypto.getRandomValues(new Uint8Array(16));

                const createOptions = {
                    publicKey: {
                        rp: { name: "HMAC-Secret Test App" },
                        user: {
                            id: userId,
                            name: "testuser@example.com",
                            displayName: "Test User"
                        },
                        challenge: challenge,
                        pubKeyCredParams: [
                            { type: "public-key", alg: -7 },   // ES256
                            { type: "public-key", alg: -257 }  // RS256
                        ],
                        authenticatorSelection: {
                            userVerification: "preferred",
                            residentKey: "discouraged"
                        },
                        extensions: {
                            // The create-only extension declaration
                            hmacCreateSecret: true
                        }
                    }
                };

                const credential = await navigator.credentials.create(createOptions);
                
                const extResults = credential.getClientExtensionResults();
                log("Extension Results:");
                log(extResults);

                if (extResults.hmacCreateSecret) {
                    log("✅ SUCCESS: Authenticator returned hmacCreateSecret: true");
                    savedCredentialId = credential.rawId;
                    btnGet.disabled = false;
                } else {
                    log("❌ WARNING: Authenticator did NOT return hmacCreateSecret. It may not be supported.");
                }
            } catch (err) {
                log("Error during creation: " + err.message);
            }
        });

        btnGet.addEventListener('click', async () => {
            log("\n--- Starting Assertion (hmacGetSecret) ---");
            if (!savedCredentialId) {
                log("No credential ID saved. Run creation first.");
                return;
            }

            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                // Provide a random 32-byte salt for the authenticator to hash
                const salt1 = crypto.getRandomValues(new Uint8Array(32));
                
                log("Generated Salt 1 (Hex): " + bufferToHex(salt1));

                const getOptions = {
                    publicKey: {
                        challenge: challenge,
                        allowCredentials: [{
                            type: "public-key",
                            id: savedCredentialId
                        }],
                        userVerification: "required",
                        extensions: {
                            hmacGetSecret: {
                                salt1: salt1.buffer // Must pass the ArrayBuffer
                            }
                        }
                    }
                };

                const assertion = await navigator.credentials.get(getOptions);
                const extResults = assertion.getClientExtensionResults();
                
                if (extResults.hmacGetSecret && extResults.hmacGetSecret.output1) {
                    log("✅ SUCCESS: hmacGetSecret returned an output!");
                    const outputHex = bufferToHex(extResults.hmacGetSecret.output1);
                    log("HMAC Output 1 (Hex): " + outputHex);
                } else {
                    log("❌ WARNING: Authenticator did not return hmacGetSecret data.");
                    log("Extension Results:");
                    log(extResults);
                }
            } catch (err) {
                log("Error during assertion: " + err.message);
            }
        });
    </script>
</body>
</html>
